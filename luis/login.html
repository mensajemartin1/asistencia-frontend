<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Sistema de Asistencia</title>

<style>

body{
font-family:Arial;
background:linear-gradient(135deg,#2563eb,#06b6d4);
height:100vh;
display:flex;
justify-content:center;
align-items:center;
}

.login-box{
background:white;
padding:40px;
border-radius:10px;
width:320px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
text-align:center;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:10px;
background:#2563eb;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}

.link{
color:#2563eb;
cursor:pointer;
font-size:14px;
margin-top:10px;
display:block;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Sistema de Asistencia</h2>

<input type="text" id="usuario" placeholder="Usuario">

<input type="password" id="password" placeholder="Contraseña">

<label>
<input type="checkbox" onclick="mostrarPassword()"> Mostrar contraseña
</label>

<button onclick="login()">Iniciar sesión</button>

<div id="mensaje"></div>

<span class="link" onclick="registrar()">Crear usuario</span>

<span class="link" onclick="recuperar()">Recuperar contraseña</span>

</div>

<script src="login.js"></script>

</body>
</html>
