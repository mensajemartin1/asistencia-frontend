services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: itsz_asistencia_app
    ports:
      - "3000:80"
    volumes:
      - ./:/var/www/html
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  db:
    image: mysql:8.0
    container_name: itsz_asistencia_db
    command: --default-authentication-plugin=mysql_native_password
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: Zongolica
      MYSQL_USER: itsz
      MYSQL_PASSWORD: itsz123
    volumes:
      - mysql_data:/var/lib/mysql
      - ./database/schema_v3.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: itsz_asistencia_pma
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306

volumes:
  mysql_data:
